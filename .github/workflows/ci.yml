name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - working-directory: paper_trading/backend
        run: ruff check app/ tests/

  # ── Root-level unit tests (framework parity, costs) ─────────────────────────
  test-root:
    name: Root tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install numpy pandas httpx pytest pytest-asyncio
      - run: python -m pytest tests/ -v --tb=short

  # ── Backend unit + integration tests ────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: paper_trading/backend/requirements.txt
      - name: Install dependencies
        working-directory: paper_trading/backend
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: paper_trading/backend
        env:
          ENV: development
          DATABASE_URL: "sqlite:///./test_ci.db"
        run: python -m pytest tests/ -v --tb=short -x
      - name: Clean up test DB
        if: always()
        working-directory: paper_trading/backend
        run: rm -f test_ci.db

  # ── Frontend typecheck + build ───────────────────────────────────────────────
  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: paper_trading/frontend/package-lock.json
      - name: Install
        working-directory: paper_trading/frontend
        run: npm ci
      - name: TypeScript check
        working-directory: paper_trading/frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: paper_trading/frontend
        run: npm run build

  # ── Docker build validation ──────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # Only run on pushes to main or PRs targeting main (skip every feature branch push)
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: paper_trading/backend
          push: false
          tags: pt-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: paper_trading/frontend
          push: false
          tags: pt-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Gate: all checks must pass ───────────────────────────────────────────────
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, test-root, test-backend, frontend]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.test-root.result }}" != "success" ||
                "${{ needs.test-backend.result }}" != "success" ||
                "${{ needs.frontend.result }}" != "success" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All checks passed."
