version: "3.9"

services:
  backend:
    build: ./backend
    container_name: pt_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database between restarts
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/paper_trading.db
      # Optional email alerts — set these in a local .env file
      - ALERT_SMTP_HOST=${ALERT_SMTP_HOST:-}
      - ALERT_SMTP_PORT=${ALERT_SMTP_PORT:-587}
      - ALERT_SMTP_USER=${ALERT_SMTP_USER:-}
      - ALERT_SMTP_PASS=${ALERT_SMTP_PASS:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: pt_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
